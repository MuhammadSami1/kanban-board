name: Github Action

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Allows triggering workflow from the GitHub UI.

permissions:
  contents: read # Required to read the repository contents.
  pages: write # Required to write to GitHub Pages.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3 # Fetch the repository.

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16" # Specify your Node.js version.

      - name: Install Dependencies
        run: npm ci # Use npm ci for faster installation with a clean state.

      - name: Build Project
        run: npm run build # Build the project.

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./build # Replace with the correct output directory for your project.

  deploy:
    runs-on: ubuntu-latest
    needs: build # Ensures deployment happens only after the build is successful.

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
